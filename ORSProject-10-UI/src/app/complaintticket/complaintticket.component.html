<div class="container-fluid"
    style="background-image: url('assets/img/23964.jpg'); background-size: cover; background-attachment: fixed; min-height: 100vh; padding-top: 70px; padding-bottom: 75px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Complaint
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Complaint
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- Complaint Ticket ID -->
                        <label><b>Complaint Ticket ID*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-ticket"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control"
                                [(ngModel)]="form.data.complaintTicketId"
                                name="complaintTicketId"
                                placeholder="Enter Complaint Ticket ID">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.complaintTicketId}}</span>
                        </div>

                        <!-- Issue Type -->
                        <label><b>Issue Type*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-exclamation-circle"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control"
                                [(ngModel)]="form.data.issueType"
                                name="issueType"
                                placeholder="Enter Issue Type">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.issueType}}</span>
                        </div>

                        <!-- Status -->
                        <label><b>Status*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-info-circle"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control"
                                [(ngModel)]="form.data.status"
                                name="status"
                                placeholder="Enter Status">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.status}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning"
                                [routerLink]="['/complaintticketlist']">
                                List
                            </button>

                            <button *ngIf="!form.data.id" type="button"
                                class="btn btn-warning"
                                (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

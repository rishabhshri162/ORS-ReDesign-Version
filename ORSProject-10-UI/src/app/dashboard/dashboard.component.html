<style>
   .dashboard-bg {

    min-height: 100vh;

    background:
        linear-gradient(
            rgba(18,18,18,.55),
            rgba(18,18,18,.55)
        ),
        url('assets/img/clock.jpg');

    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;

    padding-bottom: 80px;
}

.hero-box {

    text-align: center;

    background: rgba(255,255,255,.08);

    backdrop-filter: blur(15px);

    border: 1px solid rgba(255,255,255,.12);

    border-radius: 25px;

    padding: 60px;

    max-width: 850px;

    box-shadow:
        0 20px 50px rgba(0,0,0,.35);
}

.welcome-text {

    font-size: 64px;

    font-weight: 800;

    color: white;

    font-family: 'Poppins', sans-serif;

    margin-bottom: 15px;

    letter-spacing: 1px;

    text-shadow:
        0 5px 20px rgba(0,0,0,.4);
}

.welcome-subtitle {

    color: rgba(255,255,255,.85);

    font-size: 22px;

    margin-bottom: 35px;
}

.start-btn {

    background: linear-gradient(
        135deg,
        #ff7b00,
        #ff3d00
    );

    border: none;

    border-radius: 50px;

    color: white;

    padding: 14px 35px;

    font-weight: 600;

    font-size: 18px;

    transition: .3s;
}

.start-btn:hover {

    transform: translateY(-3px);

    box-shadow:
        0 10px 25px rgba(255,123,0,.4);
}

</style>
<div class="dashboard-bg">

    <div class="hero-box">

        <h1 class="welcome-text">
            Welcome to ORS Project
        </h1>

        <p class="welcome-subtitle">
            Online Result System Management Portal
        </p>

        <button class="start-btn" [routerLink]="['/dashboard']">
            Explore Application
        </button>

    </div>

</div>

<style>
   .dashboard-bg {

    min-height: 100vh;

    background:
        linear-gradient(
            rgba(18,18,18,.55),
            rgba(18,18,18,.55)
        ),
        url('assets/img/clock.jpg');

    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;

    padding-bottom: 80px;
}

.hero-box {

    text-align: center;

    background: rgba(255,255,255,.08);

    backdrop-filter: blur(15px);

    border: 1px solid rgba(255,255,255,.12);

    border-radius: 25px;

    padding: 60px;

    max-width: 850px;

    box-shadow:
        0 20px 50px rgba(0,0,0,.35);
}

.welcome-text {

    font-size: 64px;

    font-weight: 800;

    color: white;

    font-family: 'Poppins', sans-serif;

    margin-bottom: 15px;

    letter-spacing: 1px;

    text-shadow:
        0 5px 20px rgba(0,0,0,.4);
}

.welcome-subtitle {

    color: rgba(255,255,255,.85);

    font-size: 22px;

    margin-bottom: 35px;
}

.start-btn {

    background: linear-gradient(
        135deg,
        #ff7b00,
        #ff3d00
    );

    border: none;

    border-radius: 50px;

    color: white;

    padding: 14px 35px;

    font-weight: 600;

    font-size: 18px;

    transition: .3s;
}

.start-btn:hover {

    transform: translateY(-3px);

    box-shadow:
        0 10px 25px rgba(255,123,0,.4);
}

.signin-btn{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
    );

    color:white;

    border:none;

    border-radius:50px;

    padding:14px 35px;

    font-weight:600;

    box-shadow:
    0 8px 20px rgba(37,99,235,.35);

    transition:.3s;
}

.signin-btn:hover{

    transform:translateY(-3px);

    color:white;
}

.signup-btn{

    background:
    linear-gradient(
        135deg,
        #10b981,
        #059669
    );

    color:white;

    border:none;

    border-radius:50px;

    padding:14px 35px;

    font-weight:600;

    box-shadow:
    0 8px 20px rgba(16,185,129,.35);

    transition:.3s;
}

.signup-btn:hover{

    transform:translateY(-3px);

    color:white;
}

.getmarksheet-btn{

    background: linear-gradient(
        135deg,
        #f59e0b,
        #ea580c
    ) !important;

    color: white !important;

    border: none;

    border-radius: 50px;

    padding: 14px 40px;

    font-size: 18px;

    font-weight: 600;

    box-shadow:
        0 8px 20px rgba(245,158,11,.35);

    transition: .3s;
}

.getmarksheet-btn:hover{

    transform: translateY(-3px);

    color: white !important;

    box-shadow:
        0 12px 25px rgba(245,158,11,.45);
}
.activity-panel{

    margin-top:30px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:20px;

    padding:25px;

    color:white;
}

.activity-title{

    font-weight:700;

    margin-bottom:20px;

    color:white;
}

.activity-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:15px;

    margin-bottom:12px;

    border-radius:12px;

    background:rgba(255,255,255,.05);

    transition:.3s;
}

.activity-item:hover{

    transform:translateX(5px);

    background:rgba(255,255,255,.1);
}

.activity-item i{

    font-size:18px;

    margin-right:10px;
}

.activity-item span{

    flex:1;

    margin-left:10px;
}

.activity-item small{

    color:#cbd5e1;
}

</style>
<div class="dashboard-bg">

    <div class="hero-box">



        <h1 class="welcome-text">
            Welcome to ORS Project
        </h1>

        <p class="welcome-subtitle">
            Online Result System Management Portal
        </p>

      <div *ngIf="isLogin()" class="mt-4 text-center">

  <button
    routerLink="/getmarksheet"
    class="btn btn-lg getmarksheet-btn">

    <i class="fa fa-search mr-2"></i>
    Get Marksheet

</button>

</div>
       <div class="mt-4 text-center">

     <div *ngIf="!isLogin()" class="mt-4 text-center">

            <button
                routerLink="/login"
                class="btn btn-lg signin-btn mr-3">

                <i class="fa fa-sign-in mr-2"></i>
                Sign In

            </button>

            <button
                routerLink="/signup"
                class="btn btn-lg signup-btn">

                <i class="fa fa-user-plus mr-2"></i>
                Sign Up

            </button>

        </div>


</div>

    </div>

</div>

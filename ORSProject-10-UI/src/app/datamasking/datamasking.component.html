<div class="container-fluid"
    style="background-image: url('assets/img/23964.jpg'); background-size: cover; background-attachment: fixed; min-height: 100vh; padding-top: 70px; padding-bottom: 75px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Data Masking
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Data Masking
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- MASK CODE -->
                        <label><b>Mask Code*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-code"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control"
                                [(ngModel)]="form.data.maskCode"
                                name="maskCode"
                                placeholder="Enter Mask Code">
                        </div>
                        <div>
                        <span class="text-danger">{{form.inputerror.maskCode}}</span>
                        </div>

                        <!-- FIELD NAME -->
                        <label><b>Field Name*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-tag"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control"
                                [(ngModel)]="form.data.fieldName"
                                name="fieldName"
                                placeholder="Enter Field Name">
                        </div>
                        <div>
                        <span class="text-danger">{{form.inputerror.fieldName}}</span>
                        </div>

                        <!-- MASK TYPE -->
                        <label><b>Mask Type*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-shield"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control"
                                [(ngModel)]="form.data.maskType"
                                name="maskType"
                                placeholder="Enter Mask Type">
                        </div>
                        <div>
                        <span class="text-danger">{{form.inputerror.maskType}}</span>
                        </div>

                        <!-- STATUS -->
                        <label><b>Status*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-info-circle"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control"
                                [(ngModel)]="form.data.status"
                                name="status"
                                placeholder="Enter Status">
                        </div>
                        <div>
                        <span class="text-danger">{{form.inputerror.status}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning"
                                [routerLink]="['/datamaskinglist']">
                                List
                            </button>

                            <button *ngIf="!form.data.id" type="button"
                                class="btn btn-warning"
                                (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

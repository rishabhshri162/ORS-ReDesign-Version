<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow-lg">
        <div class="card-body">

          <!-- TITLE -->
          <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
            Add Device
          </h3>

          <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
            Update Device
          </h3>

          <!-- SUCCESS MESSAGE -->
          <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
            {{form.message}}
          </div>

          <!-- ERROR MESSAGE -->
          <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
            {{form.message}}
          </div>

          <form>

            <!-- DEVICE CODE -->
            <label><b>Device Code*</b></label>
            <input type="text" class="form-control mb-2"
                   [(ngModel)]="form.data.deviceCode"
                   name="deviceCode"
                   placeholder="Enter Device Code">
            <span class="text-danger">{{form.inputerror.deviceCode}}</span>

            <!-- DEVICE NAME -->
            <label><b>Device Name*</b></label>
            <input type="text" class="form-control mb-2"
                   [(ngModel)]="form.data.deviceName"
                   name="deviceName"
                   placeholder="Enter Device Name">
            <span class="text-danger">{{form.inputerror.deviceName}}</span>

            <!-- DEVICE TYPE -->
            <label><b>Device Type*</b></label>
            <input type="text" class="form-control mb-2"
                   [(ngModel)]="form.data.deviceType"
                   name="deviceType"
                   placeholder="Enter Device Type">
            <span class="text-danger">{{form.inputerror.deviceType}}</span>

            <!-- STATUS -->
            <label><b>Status*</b></label>
            <select class="form-control mb-2"
                    [(ngModel)]="form.data.status"
                    name="status">
              <option value="">--Select Status--</option>
              <option value="ACTIVE">Active</option>
              <option value="INACTIVE">Inactive</option>
            </select>
            <span class="text-danger">{{form.inputerror.status}}</span>

            <!-- BUTTONS -->
            <div class="text-center mt-3">
              <button type="button" class="btn btn-success me-2" (click)="submit()">
                {{form.data.id ? 'Update' : 'Save'}}
              </button>

              <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/devicelist']">
                List
              </button>

              <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                Reset
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<div class="container-fluid"
    style="background-image: url('assets/img/23964.jpg'); background-size: cover; background-attachment: fixed; min-height: 100vh; padding-top: 70px; padding-bottom: 75px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Invoice Item
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Invoice Item
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- ITEM CODE -->
                        <label><b>Item Code*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-barcode"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control" [(ngModel)]="form.data.itemCode" name="itemCode"
                                placeholder="Enter Item Code">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.itemCode}}</span>
                        </div>

                        <!-- PRODUCT NAME -->
                        <label><b>Product Name*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-box"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control" [(ngModel)]="form.data.productName"
                                name="productName" placeholder="Enter Product Name">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.productName}}</span>
                        </div>

                        <!-- QUANTITY -->
                        <label><b>Quantity*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-sort-numeric-up"></i>
                                </span>
                            </div>
                            <input type="number" class="form-control" [(ngModel)]="form.data.quantity" name="quantity"
                                placeholder="Enter Quantity">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.quantity}}</span>
                        </div>

                        <!-- STATUS -->
                        <label><b>{{'STATUS' | translate }}*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-venus-mars"></i>
                                </span>
                            </div>
                            <select class="form-control" [(ngModel)]="form.data.status" name="status">
                                <option value="undefined">Select</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.status}}</span>
                        </div>
                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/invoiceitemlist']">
                                List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

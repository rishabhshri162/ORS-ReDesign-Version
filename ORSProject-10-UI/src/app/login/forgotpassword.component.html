<style>

.bg-container {

    min-height: 100vh;

    background:
        radial-gradient(circle at 20% 20%,
            rgba(37,99,235,.35),
            transparent 30%),

        radial-gradient(circle at 80% 70%,
            rgba(124,58,237,.25),
            transparent 35%),

        radial-gradient(circle at 50% 50%,
            rgba(59,130,246,.15),
            transparent 40%),

        #0f172a;
}

.forgot-card{

    background: rgba(30,41,59,.55);

    backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,.08);

    border-radius: 24px;

    box-shadow:
        0 20px 60px rgba(0,0,0,.4),
        0 0 40px rgba(37,99,235,.15);
}

.forgot-title{

    color:#fff;

    font-size:32px;

    font-weight:700;
}

.forgot-subtitle{

    color:rgba(255,255,255,.75);

    font-size:14px;

    margin-bottom:25px;
}

.form-label{

    color:#fff;

    font-weight:600;
}

.input-group{

    overflow:hidden;

    border-radius:14px;
}

.input-group-text{

    background:rgba(255,255,255,.12);

    border:none;

    color:#fff;

    width:55px;

    justify-content:center;
}

.form-control{

    border:none;

    height:55px;

    background:rgba(255,255,255,.92);
}

.form-control:focus{

    box-shadow:
        0 0 0 3px rgba(37,117,252,.25);

    background:#fff;
}

.go-btn{

    min-width:150px;

    height:52px;

    border:none;

    border-radius:14px;

    background:
        linear-gradient(
            135deg,
            #6a11cb,
            #2575fc
        );

    color:#fff;

    font-weight:600;

    transition:.3s;
}

.go-btn:hover{

    transform:translateY(-2px);

    box-shadow:
        0 10px 20px rgba(37,117,252,.35);
}

.text-danger{

    color:#ffb3b3 !important;
}

.alert{

    border-radius:12px;
}

</style>

<div class="bg-container d-flex align-items-center justify-content-center">

    <div class="col-xl-4 col-lg-5 col-md-6 col-sm-10">

        <div class="card forgot-card">

            <div class="card-body p-5">

                <!-- Heading -->

                <h2 class="text-center forgot-title">
                    Forgot Password?
                </h2>

                <p class="text-center forgot-subtitle">
                    Enter your registered email address and we’ll send your password.
                </p>

                <!-- Success -->

                <div *ngIf="!form.error && form.message"
                    class="alert alert-success text-center">

                    {{ form.message }}

                </div>

                <!-- Error -->

                <div *ngIf="form.error && form.message"
                    class="alert alert-danger text-center">

                    {{ form.message }}

                </div>

                <!-- Email -->

                <label class="form-label">
                    Email Address
                    <span class="text-danger">*</span>
                </label>

                <div class="input-group mb-2">

                    <span class="input-group-text">
                        <i class="fa fa-envelope"></i>
                    </span>

                    <input type="text"
                        class="form-control"
                        [(ngModel)]="form.data.loginId"
                        placeholder="Enter your email">

                </div>

                <small class="text-danger">
                    {{ form.inputerror.loginId }}
                </small>

                <!-- Button -->

                <div class="text-center mt-4">

                    <button
                        class="btn go-btn"
                        (click)="submit()">

                        <i class="fa fa-paper-plane mr-2"></i>
                        Send Password

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

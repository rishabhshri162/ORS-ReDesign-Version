<div class="container-fluid register-bg">

    <style>
        .register-bg {
            min-height: 100vh;
            padding-top: 90px;
            padding-bottom: 90px;

            background:
                radial-gradient(circle at 20% 20%, rgba(37, 99, 235, .25), transparent 35%),
                radial-gradient(circle at 80% 70%, rgba(124, 58, 237, .20), transparent 35%),
                #0f172a;
        }

        .register-card {

            background: rgba(30, 41, 59, .60);

            backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 24px;

            box-shadow:
                0 20px 50px rgba(0, 0, 0, .45);
        }

        .register-title {

            color: #fff;

            font-size: 34px;

            font-weight: 700;

            text-align: center;

            margin-bottom: 25px;
        }

        .form-label {

            color: #fff;

            font-weight: 600;

            margin-bottom: 8px;
        }

        .input-group {

            overflow: hidden;

            border-radius: 12px;
        }

        .input-group-text {

            width: 52px;

            justify-content: center;

            background: rgba(255, 255, 255, .12);

            border: none;

            color: #fff;
        }

        .form-control {

            border: none;

            height: 50px;

            background: rgba(255, 255, 255, .92);
        }

        .form-control:focus {

            box-shadow: 0 0 0 3px rgba(59, 130, 246, .25);
        }

        select.form-control {
            height: 50px;
        }

        .signup-btn {

            background: linear-gradient(135deg, #10b981, #059669);

            border: none;

            color: white;

            min-width: 140px;

            height: 50px;

            border-radius: 12px;

            font-weight: 600;
        }

        .reset-btn {

            background: rgba(255, 255, 255, .12);

            border: 1px solid rgba(255, 255, 255, .15);

            color: white;

            min-width: 140px;

            height: 50px;

            border-radius: 12px;

            font-weight: 600;
        }

        .text-danger {

            color: #ffb4b4 !important;

            font-size: 13px;
        }

        .alert {

            border-radius: 12px;
        }
    </style>



    <div class="row justify-content-center">

        <div class="col-xl-6 col-lg-7 col-md-9">

            <div class="card register-card">

                <div class="card-body p-5">

                   

                            <!-- TITLE -->
                            <h3 class="register-title">
                                User Registration
                            </h3>

                            <!-- SUCCESS -->
                            <div *ngIf="!form.error && form.message"
                                class="alert alert-success alert-dismissible text-center">
                                <button type="button" class="close" data-dismiss="alert">&times;</button>
                                {{ form.message }}
                            </div>

                            <!-- ERROR -->
                            <div *ngIf="form.error && form.message"
                                class="alert alert-danger alert-dismissible text-center">
                                <button type="button" class="close" data-dismiss="alert">&times;</button>
                                {{ form.message }}
                            </div>

                            <!-- FIRST NAME -->
                            <label class="form-label">First Name *</label>
                            <div class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fa fa-user"></i>
                                    </span>
                                </div>
                                <input type="text" class="form-control" name="firstName"
                                    [(ngModel)]="form.data.firstName" placeholder="First Name">
                            </div>
                            <div class="text-danger">{{form.inputerror.firstName}}</div>

                            <!-- LAST NAME -->
                            <label class="form-label">Last Name *</label>
                            <div class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fa fa-user-circle"></i>
                                    </span>
                                </div>
                                <input type="text" class="form-control" name="lastName" [(ngModel)]="form.data.lastName"
                                    placeholder="Last Name">
                            </div>
                            <div class="text-danger">{{form.inputerror.lastName}}</div>

                            <!-- PASSWORD -->
                            <label class="form-label">Password *</label>
                            <div class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fa fa-key"></i>
                                    </span>
                                </div>
                                <input type="password" class="form-control" name="password"
                                    [(ngModel)]="form.data.password" placeholder="Enter Password">
                            </div>
                            <div class="text-danger">{{form.inputerror.password}}</div>

                            <!-- CONFIRM PASSWORD -->
                            <label class="form-label">Confirm Password *</label>
                            <div class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fa fa-key"></i>
                                    </span>
                                </div>
                                <input type="password" class="form-control" name="confirmPassword"
                                    [(ngModel)]="form.data.confirmPassword" placeholder="Confirm Password">
                            </div>
                            <div class="text-danger">{{form.inputerror.password}}</div>

                            <!-- EMAIL -->
                            <label class="form-label">Email Id *</label>
                            <div class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fa fa-envelope"></i>
                                    </span>
                                </div>
                                <input type="text" class="form-control" name="loginId" [(ngModel)]="form.data.loginId"
                                    placeholder="Email Id">
                            </div>
                            <div class="text-danger">{{form.inputerror.loginId}}</div>

                            <!-- MOBILE -->
                            <label class="form-label">Mobile No *</label>
                            <div class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fa fa-phone"></i>
                                    </span>
                                </div>
                                <input type="text" class="form-control" name="phone5" [(ngModel)]="form.data.phone"
                                    maxlength="10" placeholder="Mobile No">
                            </div>
                            <div class="text-danger">{{form.inputerror.phone}}</div>

                            <!-- GENDER -->
                            <label class="form-label">Gender *</label>
                            <div class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fa fa-venus-mars"></i>
                                    </span>
                                </div>
                                <select class="form-control" name="gender" [(ngModel)]="form.data.gender">
                                    <option value="undefined">------------Select------------</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            <div class="text-danger">{{form.inputerror.gender}}</div>

                            <!-- DOB -->
                            <label class="form-label">Date of Birth *</label>
                            <div class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fa fa-calendar"></i>
                                    </span>
                                </div>
                                <input type="date" class="form-control" name="dob" [(ngModel)]="form.data.dob"
                                    [ngModel]="form.data.dob | date:'yyyy-MM-dd'" [max]="datepicker.max">
                            </div>
                            <div class="text-danger">{{form.inputerror.dob}}</div>

                            <!-- BUTTONS -->
                            <div class="text-center mt-4">

                                <button (click)="signUp()" class="btn signup-btn mr-2">

                                    <i class="fa fa-user-plus mr-1"></i>
                                    Sign Up

                                </button>

                                <button (click)="reset()" class="btn reset-btn">

                                    <i class="fa fa-refresh mr-1"></i>
                                    Reset

                                </button>

                            </div>
                        </div>
              

                <div class="col-md-4"></div>
            </div>

        </div>

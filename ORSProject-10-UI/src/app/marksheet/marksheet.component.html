<div class="container-fluid marksheet-bg">
    <style>
        .marksheet-bg {

            background:
                linear-gradient(rgba(15, 23, 42, .82),
                    rgba(15, 23, 42, .82)),
                url('assets/img/wall.jpg');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            min-height: 100vh;

            padding-top: 90px;
            padding-bottom: 90px;
        }

        .marksheet-card {

            background: rgba(255, 255, 255, .08);

            backdrop-filter: blur(20px);

            border-radius: 25px;

            border: 1px solid rgba(255, 255, 255, .08);

            box-shadow:
                0 20px 40px rgba(0, 0, 0, .35);
        }

        .form-title {

            color: white;

            font-size: 40px;

            font-weight: 700;

            text-shadow:
                0 5px 20px rgba(0, 0, 0, .4);
        }

        .form-label {

            color: white;

            font-weight: 600;

            margin-top: 10px;
        }

        .input-group-text {

            background:
                rgba(255, 255, 255, .15);

            color: white;

            border: none;
        }

        .form-control {

            border: none;

            height: 50px;

            border-radius: 0 12px 12px 0;
        }

        .form-control:focus {

            box-shadow:
                0 0 0 3px rgba(37, 99, 235, .25);
        }

        .save-btn {

            background:
                linear-gradient(135deg,
                    #10b981,
                    #059669);

            border: none;

            color: white;

            border-radius: 12px;

            padding: 10px 25px;
        }

        .reset-btn {

            background:
                rgba(255, 255, 255, .12);

            border: 1px solid rgba(255, 255, 255, .2);

            color: white;

            border-radius: 12px;

            padding: 10px 25px;
        }

        .error-text {

            color: #ffb3b3;

            font-size: 14px;
        }
    </style>
    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-lg-4 col-md-8">

            <div class="card marksheet-card">
            <div class="card-body p-4">

                    <!-- TITLE -->
                    <h3 class="text-center form-title" *ngIf="!form.data.id">
                        Add Marksheet
                    </h3>

                    <h3 class="text-center form-title" *ngIf="form.data.id>0">
                        Update Marksheet
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="form.error == false && form.message"
                        class="alert alert-success alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- ROLL NO -->
                    <label class="form-label">
                        Roll No *
                    </label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-list-ol"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control" name="rollNo" [(ngModel)]="form.data.rollNo"
                            maxlength="5" placeholder="Enter Roll No">
                    </div>
                    <div class="error-text">{{form.inputerror.rollNo}}</div>

                    <!-- STUDENT -->
                    <label class="form-label">
                        Student Name *
                    </label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-user"></i>
                            </span>
                        </div>
                        <select class="form-control" name="studentId" [(ngModel)]="form.data.studentId">
                            <option value="undefined">------------Select------------</option>
                            <option *ngFor="let obj of form.preload.studentList" [value]="obj.key">
                                {{obj.value}}
                            </option>
                        </select>
                    </div>
                    <div class="error-text">{{form.inputerror.studentId}}</div>

                    <!-- PHYSICS -->
                    <label class="form-label">
                        Physics *
                    </label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-equals"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control" name="physics" [(ngModel)]="form.data.physics"
                            maxlength="3" placeholder="Enter Physics Marks">
                    </div>
                    <div class="error-text">{{form.inputerror.physics}}</div>

                    <!-- CHEMISTRY -->
                    <label class="form-label">
                        Chemistry *
                    </label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-equals"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control" name="chemistry" [(ngModel)]="form.data.chemistry"
                            maxlength="3" placeholder="Enter Chemistry Marks">
                    </div>
                    <div class="error-text">{{form.inputerror.chemistry}}</div>

                    <!-- MATHS -->
                    <label class="form-label">
                        Maths *
                    </label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-equals"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control" name="maths" [(ngModel)]="form.data.maths" maxlength="3"
                            placeholder="Enter Maths Marks">
                    </div>
                    <div class="error-text">{{form.inputerror.maths}}</div>

                    <!-- BUTTONS -->
                    <div class="text-center mt-4">

                        <button *ngIf="!form.data.id" (click)="submit()" class="btn save-btn mr-2">
                            Save
                        </button>

                        <button *ngIf="form.data.id" (click)="submit()" class="btn save-btn mr-2">
                            Update
                        </button>

                        <button *ngIf="!form.data.id" (click)="reset()" class="btn reset-btn mr-2">
                            Reset
                        </button>

                        <button *ngIf="form.data.id" (click)="forward('/marksheetlist')" class="btn reset-btn">
                            List
                        </button>

                    </div>

                </div>
            </div>

        </div>

        <div class="col-md-4"></div>
    </div>

</div>

<div class="container-fluid role-bg">

    <style>
        .role-bg{

    background:
        linear-gradient(
            rgba(15,23,42,.75),
            rgba(15,23,42,.75)
        ),
        url('assets/img/wall.jpg');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    min-height: 100vh;

    padding-top: 90px;
    padding-bottom: 90px;
}

.modern-card{

    background: rgba(255,255,255,.08);

    backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,.10);

    border-radius: 25px;

    box-shadow:
        0 20px 50px rgba(0,0,0,.35);
}

.form-title{

    color: white;

    font-size: 42px;

    font-weight: 700;

    margin-bottom: 25px;
}

.modern-label{

    color: white;

    font-weight: 600;

    margin-bottom: 8px;
}

.input-group-text{

    background: rgba(255,255,255,.12);

    border: none;

    color: white;
}

.form-control{

    border: none;

    background: rgba(255,255,255,.92);
}

.form-control:focus{

    box-shadow:
        0 0 0 3px rgba(255,123,0,.25);
}

.save-btn{

    background:
        linear-gradient(
            135deg,
            #ff7b00,
            #ff4500
        );

    border: none;

    color: white;

    border-radius: 12px;

    padding: 10px 28px;

    font-weight: 600;
}

.reset-btn{

    border-radius: 12px;

    padding: 10px 28px;
}

.text-danger{

    color: #ffb3b3 !important;
}
    </style>

    <div class="row">
        <div class="col-md-4"></div>

      <div class="col-lg-6 col-md-8">
            <div class="card modern-card">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center form-title" *ngIf="form.data.id == null">
                        Add Role
                    </h3>
                    <h3 class="text-center form-title" *ngIf="form.data.id>0">
                        Update Role
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="form.error == false && form.message"
                        class="alert alert-success alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- NAME -->
                    <label class="modern-label">
                        Name *
                    </label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-user"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control" [(ngModel)]="form.data.name" name="name"
                            placeholder="Enter Role Name">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.name}}</span>
                    </div>

                    <!-- DESCRIPTION -->
                    <label class="modern-label">
                        Description *
                    </label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-list"></i>
                            </span>
                        </div>
                        <textarea class="form-control" [(ngModel)]="form.data.description" name="description" rows="2"
                            placeholder="Enter Short description">
    </textarea>
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.description}}</span>
                    </div>

                    <!-- BUTTONS -->
                    <div class="text-center mt-4">

                        <button *ngIf="!form.data.id" (click)="submit()" class="btn save-btn mr-2">
                            Save
                        </button>

                        <button *ngIf="form.data.id" (click)="submit()" class="btn save-btn mr-2">
                            Update
                        </button>

                        <button *ngIf="!form.data.id" (click)="reset()" class="btn btn-outline-light reset-btn mr-2">
                            Reset
                        </button>

                        <button *ngIf="form.data.id" (click)="forward('/rolelist')" class="btn btn-outline-light reset-btn">
                            List
                        </button>

                    </div>

                </div>
            </div>

        </div>

        <div class="col-md-4"></div>
    </div>

</div>

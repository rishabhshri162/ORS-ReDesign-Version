<style>

.student-bg{

    background:
    linear-gradient(
        rgba(15,23,42,.85),
        rgba(15,23,42,.85)
    ),
    url('assets/img/wall.jpg');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    min-height: 100vh;

    padding-top: 90px;
    padding-bottom: 90px;
}

.student-card{

    background:
    rgba(255,255,255,.08);

    backdrop-filter: blur(20px);

    border-radius: 25px;

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:
    0 20px 40px rgba(0,0,0,.35);
}

.form-title{

    color:white;

    font-size:38px;

    font-weight:700;

    text-shadow:
    0 5px 20px rgba(0,0,0,.4);
}

.form-label{

    color:white;

    font-weight:600;

    margin-top:10px;
}

.input-group-text{

    background:
    rgba(255,255,255,.15);

    color:white;

    border:none;
}

.form-control{

    border:none;

    min-height:50px;
}

.form-control:focus{

    box-shadow:
    0 0 0 3px rgba(37,99,235,.25);
}

.error-text{

    color:#ffb3b3;

    font-size:14px;
}

.save-btn{

    background:
    linear-gradient(
        135deg,
        #10b981,
        #059669
    );

    color:white;

    border:none;

    border-radius:12px;

    padding:10px 25px;
}

.reset-btn{

    background:
    rgba(255,255,255,.12);

    color:white;

    border:
    1px solid rgba(255,255,255,.15);

    border-radius:12px;

    padding:10px 25px;
}

</style>

<div class="container-fluid student-bg">

    <div class="row">

        <div class="col-md-3"></div>

        <div class="col-lg-6 col-md-6">

            <div class="card student-card">

                <div class="card-body p-4">

                    <h2 class="text-center form-title"
                        *ngIf="!form.data.id">
                        Add Student
                    </h2>

                    <h2 class="text-center form-title"
                        *ngIf="form.data.id>0">
                        Update Student
                    </h2>

                    <div *ngIf="form.error == false && form.message"
                         class="alert alert-success alert-dismissible text-center">

                        <button type="button"
                                class="close"
                                data-dismiss="alert">

                            &times;

                        </button>

                        {{ form.message }}

                    </div>

                    <div *ngIf="form.error && form.message"
                         class="alert alert-danger alert-dismissible text-center">

                        <button type="button"
                                class="close"
                                data-dismiss="alert">

                            &times;

                        </button>

                        {{ form.message }}

                    </div>

                    <!-- ENROL -->

                    <label class="form-label">
                        Enrol No *
                    </label>

                    <div class="input-group mb-2">

                        <div class="input-group-prepend">

                            <span class="input-group-text">
                                <i class="fa fa-id-card"></i>
                            </span>

                        </div>

                        <input type="text"
                               class="form-control"
                               name="enrolNo"
                               [(ngModel)]="form.data.enrolNo"
                               placeholder="Enter Enrol No">

                    </div>

                    <div class="error-text">
                        {{form.inputerror.enrolNo}}
                    </div>

                    <!-- FIRST NAME -->

                    <label class="form-label">
                        First Name *
                    </label>

                    <div class="input-group mb-2">

                        <div class="input-group-prepend">

                            <span class="input-group-text">
                                <i class="fa fa-user"></i>
                            </span>

                        </div>

                        <input type="text"
                               class="form-control"
                               name="firstName"
                               [(ngModel)]="form.data.firstName"
                               placeholder="Enter First Name">

                    </div>

                    <div class="error-text">
                        {{form.inputerror.firstName}}
                    </div>

                    <!-- LAST NAME -->

                    <label class="form-label">
                        Last Name *
                    </label>

                    <div class="input-group mb-2">

                        <div class="input-group-prepend">

                            <span class="input-group-text">
                                <i class="fa fa-user-circle"></i>
                            </span>

                        </div>

                        <input type="text"
                               class="form-control"
                               name="lastName"
                               [(ngModel)]="form.data.lastName"
                               placeholder="Enter Last Name">

                    </div>

                    <div class="error-text">
                        {{form.inputerror.lastName}}
                    </div>

                    <!-- EMAIL -->

                    <label class="form-label">
                        Email *
                    </label>

                    <div class="input-group mb-2">

                        <div class="input-group-prepend">

                            <span class="input-group-text">
                                <i class="fa fa-envelope"></i>
                            </span>

                        </div>

                        <input type="text"
                               class="form-control"
                               name="email"
                               [(ngModel)]="form.data.email"
                               placeholder="Enter Email ID">

                    </div>

                    <div class="error-text">
                        {{form.inputerror.email}}
                    </div>

                    <!-- DOB -->

                    <label class="form-label">
                        Date of Birth *
                    </label>

                    <div class="input-group mb-2">

                        <div class="input-group-prepend">

                            <span class="input-group-text">
                                <i class="fa fa-calendar"></i>
                            </span>

                        </div>

                        <input type="date"
                               class="form-control"
                               name="dob"
                               [(ngModel)]="form.data.dob"
                               [ngModel]="form.data.dob | date:'yyyy-MM-dd'">

                    </div>

                    <div class="error-text">
                        {{form.inputerror.dob}}
                    </div>

                    <!-- COLLEGE -->

                    <label class="form-label">
                        College *
                    </label>

                    <div class="input-group mb-2">

                        <div class="input-group-prepend">

                            <span class="input-group-text">
                                <i class="fa fa-building"></i>
                            </span>

                        </div>

                        <select class="form-control"
                                name="collegeId"
                                [(ngModel)]="form.data.collegeId">

                            <option value="undefined">
                                ------------Select------------
                            </option>

                            <option *ngFor="let obj of form.preload.collegeList"
                                    [value]="obj.key">

                                {{obj.value}}

                            </option>

                        </select>

                    </div>

                    <div class="error-text">
                        {{form.inputerror.collegeId}}
                    </div>

                    <!-- MOBILE -->

                    <label class="form-label">
                        Mobile No *
                    </label>

                    <div class="input-group mb-2">

                        <div class="input-group-prepend">

                            <span class="input-group-text">
                                <i class="fa fa-phone"></i>
                            </span>

                        </div>

                        <input type="text"
                               class="form-control"
                               name="phoneNo"
                               [(ngModel)]="form.data.phoneNo"
                               maxlength="10"
                               placeholder="Enter Mobile No">

                    </div>

                    <div class="error-text">
                        {{form.inputerror.phoneNo}}
                    </div>

                    <div class="text-center mt-4">

                        <button *ngIf="!form.data.id"
                                (click)="submit()"
                                class="btn save-btn mr-2">

                            Save

                        </button>

                        <button *ngIf="form.data.id"
                                (click)="submit()"
                                class="btn save-btn mr-2">

                            Update

                        </button>

                        <button *ngIf="!form.data.id"
                                (click)="reset()"
                                class="btn reset-btn mr-2">

                            Reset

                        </button>

                        <button *ngIf="form.data.id"
                                (click)="forward('/studentlist')"
                                class="btn reset-btn">

                            List

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-3"></div>

    </div>

</div>

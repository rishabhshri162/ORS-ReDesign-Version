<div class="container-fluid"
    style="background-image: url('assets/img/23964.jpg'); background-size: cover; background-attachment: fixed; min-height: 100vh; padding-top: 70px; padding-bottom: 75px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Timezone
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Timezone
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- TIMEZONE CODE -->
                        <label><b>Timezone Code*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-code"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control" [(ngModel)]="form.data.timezoneCode"
                                name="timezoneCode" placeholder="Enter Timezone Code">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.timezoneCode}}</span>
                        </div>

                        <!-- TIMEZONE NAME -->
                        <label><b>Timezone Name*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-globe"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control" [(ngModel)]="form.data.timezoneName"
                                name="timezoneName" placeholder="Enter Timezone Name">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.timezoneName}}</span>
                        </div>

                        <!-- OFFSET -->
                        <label><b>Offset*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-clock"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control" [(ngModel)]="form.data.offset" name="offset"
                                placeholder="Enter Offset (e.g. +05:30)">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.offset}}</span>
                        </div>

                        <!-- STATUS -->
                        <label><b>Status*</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-toggle-on"></i>
                                </span>
                            </div>
                            <select class="form-control" [(ngModel)]="form.data.status" name="status">
                                <option value="undefined">--Select Status--</option>
                                <option value="ACTIVE">Active</option>
                                <option value="INACTIVE">Inactive</option>
                            </select>
                        </div>
                        <span class="text-danger">{{form.inputerror.status}}</span>


                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/timezonelist']">
                                List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

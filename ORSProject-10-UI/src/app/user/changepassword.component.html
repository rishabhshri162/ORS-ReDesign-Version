<div class="container-fluid" style="background-image: url('assets/img/password.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 55px;
     padding-bottom: 75px;">

    <div class="row">
        <div class="col-md-4"></div>

        <div class="col-md-4">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary font-weight-bold">
                        Change Password
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- OLD PASSWORD -->
                    <label><b>Old Password *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-key"></i>
                            </span>
                        </div>
                        <input type="password" class="form-control" name="oldPassword"
                            [(ngModel)]="form.data.oldPassword" placeholder="Enter Old Password">
                    </div>
                    <div class="text-danger">{{form.inputerror.oldPassword}}</div>

                    <!-- NEW PASSWORD -->
                    <label><b>New Password *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-lock"></i>
                            </span>
                        </div>
                        <input type="password" class="form-control" name="newPassword"
                            [(ngModel)]="form.data.newPassword" placeholder="Enter New Password">
                    </div>
                    <div class="text-danger">{{form.inputerror.newPassword}}</div>

                    <div class="text-center mt-4">
                        <button (click)="changePassword()" class="btn btn-success mr-2">
                            Change Password
                        </button>

                        <button (click)="reset()" class="btn btn-danger">
                            Reset
                        </button>
                    </div>

                </div>
            </div>

        </div>

        <div class="col-md-4"></div>
    </div>

</div>
